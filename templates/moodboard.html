{% extends "base.html" %}
{% block title %} · Moodboard{% endblock %}

{% block head %}
<style>
  .moodboard-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 52px);
  }

  /* SIDEBAR */
  .mb-sidebar {
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    position: sticky; top: 52px; height: calc(100vh - 52px);
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .mb-sidebar h2 { font-size: 14px; font-weight: 400; }

  /* BOARDS LIST */
  .boards-section { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .boards-label {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 8px;
  }
  .board-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: 4px; cursor: pointer;
    border: 1px solid transparent; transition: all .2s;
  }
  .board-item:hover { background: var(--bg2); }
  .board-item.active { background: var(--bg3); border-color: var(--border); }
  .board-item-name { flex: 1; font-size: 12px; }
  .board-item-count { font-size: 10px; color: var(--text3); }
  .board-item-del {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 12px; opacity: 0; transition: opacity .2s; padding: 0 2px;
  }
  .board-item:hover .board-item-del { opacity: 1; }
  .board-item-del:hover { color: #c06060; }

  .new-board-btn {
    width: 100%; text-align: left; background: none; border: 1px dashed var(--border);
    color: var(--text3); padding: 8px 12px; border-radius: 4px; cursor: pointer;
    font-size: 11px; transition: all .2s;
  }
  .new-board-btn:hover { border-color: var(--text2); color: var(--text2); }

  /* STATS */
  .board-stat {
    padding: 14px 16px; background: var(--bg3); border-radius: 4px;
    border: 1px solid var(--border);
  }
  .board-stat .stat-n { font-size: 22px; font-weight: 200; }
  .board-stat .stat-l { font-size: 10px; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  /* ACTIONS */
  .mb-actions { display: flex; flex-direction: column; gap: 8px; }

  /* CONTENT */
  .mb-content { padding: 32px; }
  .mb-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .mb-header-left { display: flex; align-items: center; gap: 12px; }
  .mb-title-input {
    font-size: 20px; font-weight: 300; background: none; border: none;
    color: var(--text); outline: none; width: 280px;
    border-bottom: 1px solid transparent; transition: border-color .2s;
  }
  .mb-title-input:focus { border-color: var(--border); }

  .mb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .mb-card {
    position: relative; overflow: hidden;
    background: var(--bg2); border-radius: 4px;
    border: 1px solid var(--border);
  }
  .mb-card img {
    width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
  }
  .mb-card .mb-info {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }
  .mb-card .mb-designer { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .mb-card .mb-show { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .mb-card .remove-btn {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.7); border: none; color: #fff;
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s;
  }
  .mb-card:hover .remove-btn { opacity: 1; }

  .empty-state {
    text-align: center; padding: 80px 40px;
    color: var(--text2); font-size: 14px; line-height: 2;
    grid-column: 1 / -1;
  }
  .empty-state a { color: var(--text); }

  /* DESIGNER TAGS */
  .designer-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .dtag {
    font-size: 10px; background: var(--bg3); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 3px; color: var(--text2);
  }
</style>
{% endblock %}

{% block content %}
<div class="moodboard-layout">

  <!-- SIDEBAR -->
  <div class="mb-sidebar">
    <h2>Moodboard</h2>

    <div class="boards-section">
      <div class="boards-label">Boards</div>
      <div id="boardList"></div>
      <button class="new-board-btn" onclick="createBoard()">+ New board</button>
    </div>

    <div class="board-stat">
      <div class="stat-n" id="lookCount">0</div>
      <div class="stat-l">Looks pinned</div>
    </div>

    <div>
      <div class="boards-label" style="margin-bottom:10px;">Designers on board</div>
      <div class="designer-tags" id="designerTags"></div>
    </div>

    <div class="mb-actions">
      <a href="/explore" class="btn">+ Browse Runway</a>
      <button class="btn" onclick="exportBoard()">Export CSV</button>
      <button class="btn" onclick="clearBoard()" style="color: #c06060; border-color: #3a2222;">Clear board</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="mb-content">
    <div class="mb-header">
      <div class="mb-header-left">
        <input class="mb-title-input" id="boardTitle" value="My Board"
               onchange="renameActiveBoard(this.value)"
               onblur="renameActiveBoard(this.value)">
      </div>
      <span style="font-size: 12px; color: var(--text2);">FW 2025–26</span>
    </div>

    <div class="mb-grid" id="boardGrid"></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// ── Storage helpers ───────────────────────────────────────────────────────────
function getBoards() {
  try { return JSON.parse(localStorage.getItem('mb_boards') || '{}'); } catch { return {}; }
}
function saveBoards(b) { localStorage.setItem('mb_boards', JSON.stringify(b)); }
function getActiveBoardId() { return localStorage.getItem('activeBoardId') || 'default'; }
function setActiveBoardId(id) { localStorage.setItem('activeBoardId', id); }

function ensureDefault(boards) {
  if (!boards['default']) boards['default'] = { name: 'My Board', looks: [] };
  return boards;
}

// ── Board CRUD ────────────────────────────────────────────────────────────────
function createBoard() {
  const name = prompt('Board name:', 'New Board');
  if (!name) return;
  const boards = ensureDefault(getBoards());
  const id = 'board_' + Date.now();
  boards[id] = { name, looks: [] };
  saveBoards(boards);
  setActiveBoardId(id);
  render();
}

function renameActiveBoard(name) {
  if (!name.trim()) return;
  const boards = ensureDefault(getBoards());
  const id = getActiveBoardId();
  if (boards[id]) { boards[id].name = name; saveBoards(boards); }
  renderBoardList();
}

function switchBoard(id) {
  setActiveBoardId(id);
  render();
}

function deleteBoard(id, e) {
  e.stopPropagation();
  const boards = ensureDefault(getBoards());
  const boardName = boards[id]?.name || 'this board';
  if (Object.keys(boards).length <= 1) { showToast('Cannot delete the only board'); return; }
  if (!confirm('Delete "' + boardName + '"?')) return;
  delete boards[id];
  saveBoards(boards);
  if (getActiveBoardId() === id) {
    setActiveBoardId(Object.keys(boards)[0]);
  }
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  renderBoardList();
  renderGrid();
  renderSidebar();
}

function renderBoardList() {
  const boards = ensureDefault(getBoards());
  const activeId = getActiveBoardId();
  const list = document.getElementById('boardList');
  list.innerHTML = Object.entries(boards).map(([id, board]) => `
    <div class="board-item ${id === activeId ? 'active' : ''}" onclick="switchBoard('${id}')">
      <div class="board-item-name">${escHtml(board.name)}</div>
      <div class="board-item-count">${board.looks.length}</div>
      ${Object.keys(boards).length > 1 ? `<button class="board-item-del" onclick="deleteBoard('${id}', event)" title="Delete">✕</button>` : ''}
    </div>
  `).join('');
}

function renderGrid() {
  const boards = ensureDefault(getBoards());
  const id = getActiveBoardId();
  const looks = (boards[id] && boards[id].looks) || [];
  const grid = document.getElementById('boardGrid');
  document.getElementById('boardTitle').value = (boards[id] && boards[id].name) || 'My Board';

  if (!looks.length) {
    grid.innerHTML = `<div class="empty-state">No looks pinned yet.<br><a href="/explore">Browse the runway</a> and click ☆ to pin looks here.</div>`;
    return;
  }
  grid.innerHTML = looks.map((l, i) => `
    <div class="mb-card" id="mbcard-${i}">
      <img src="${escHtml(l.image_url)}" alt="${escHtml(l.designer)}" loading="lazy" onerror="this.src=''">
      <div class="mb-info">
        <div class="mb-designer">${escHtml(l.designer)}</div>
        <div class="mb-show">${escHtml(l.show)} · Look ${escHtml(String(l.look_number))}</div>
      </div>
      <button class="remove-btn" onclick="removeLook('${escAttr(l.image_url)}')">✕</button>
    </div>
  `).join('');
}

function renderSidebar() {
  const boards = ensureDefault(getBoards());
  const id = getActiveBoardId();
  const looks = (boards[id] && boards[id].looks) || [];
  document.getElementById('lookCount').textContent = looks.length;
  const designers = [...new Set(looks.map(l => l.designer))];
  document.getElementById('designerTags').innerHTML = designers
    .map(d => `<span class="dtag">${escHtml(d)}</span>`).join('');
}

// ── Look actions ──────────────────────────────────────────────────────────────
function removeLook(imageUrl) {
  const boards = ensureDefault(getBoards());
  const id = getActiveBoardId();
  if (!boards[id]) return;
  boards[id].looks = boards[id].looks.filter(l => l.image_url !== imageUrl);
  saveBoards(boards);
  render();
  showToast('Removed from board');
}

function clearBoard() {
  if (!confirm('Clear this entire board?')) return;
  const boards = ensureDefault(getBoards());
  const id = getActiveBoardId();
  if (boards[id]) boards[id].looks = [];
  saveBoards(boards);
  render();
  showToast('Board cleared');
}

function exportBoard() {
  const boards = ensureDefault(getBoards());
  const id = getActiveBoardId();
  const looks = (boards[id] && boards[id].looks) || [];
  if (!looks.length) { showToast('Nothing to export'); return; }
  const name = (boards[id] && boards[id].name) || 'board';
  let csv = 'designer,show,look_number,image_url\n';
  looks.forEach(l => {
    csv += `"${l.designer}","${l.show}","${l.look_number}","${l.image_url}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.replace(/\s+/g, '_').toLowerCase() + '.csv';
  a.click();
  showToast('Exported ' + name + '.csv');
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

// ── Init ──────────────────────────────────────────────────────────────────────
ensureDefault(getBoards());
render();
</script>
{% endblock %}
